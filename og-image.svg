<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f4f3ef"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="14" height="630" fill="#005a8c"/>

  <!-- Top label / breadcrumb -->
  <polygon points="80,104 80,120 92,112" fill="#888880"/>
  <text x="104" y="120" font-family="'IBM Plex Mono', monospace" font-size="26" font-weight="400" fill="#888880" letter-spacing="2">ACADEMIC REFERENCE TOOL</text>

  <!-- Site name -->
  <text x="78" y="240" font-family="'IBM Plex Mono', monospace" font-size="92" font-weight="600" fill="#005a8c" letter-spacing="-2">DOI-Ref-Lookup</text>

  <!-- Tagline -->
  <text x="80" y="310" font-family="'IBM Plex Sans', sans-serif" font-size="36" font-weight="300" fill="#1a1a18">DOI, PubMed &amp; citation metadata — free, instant, no signup.</text>

  <!-- Divider -->
  <rect x="80" y="356" width="1040" height="2" fill="#d8d5cc"/>

  <!-- Feature pills row 1 -->
  <g font-family="'IBM Plex Mono', monospace" font-size="27" font-weight="400">
    <rect x="80" y="396" width="172" height="58" fill="#fff" stroke="#d8d5cc" stroke-width="1.5"/>
    <text x="166" y="434" text-anchor="middle" fill="#1a1a18">DOI</text>

    <rect x="268" y="396" width="172" height="58" fill="#fff" stroke="#d8d5cc" stroke-width="1.5"/>
    <text x="354" y="434" text-anchor="middle" fill="#1a1a18">PubMed</text>

    <rect x="456" y="396" width="172" height="58" fill="#fff" stroke="#d8d5cc" stroke-width="1.5"/>
    <text x="542" y="434" text-anchor="middle" fill="#1a1a18">ISSN</text>

    <rect x="644" y="396" width="172" height="58" fill="#fff" stroke="#d8d5cc" stroke-width="1.5"/>
    <text x="730" y="434" text-anchor="middle" fill="#1a1a18">ISBN</text>

    <rect x="832" y="396" width="172" height="58" fill="#fff" stroke="#d8d5cc" stroke-width="1.5"/>
    <text x="918" y="434" text-anchor="middle" fill="#1a1a18">ORCID</text>
  </g>

  <!-- Feature pills row 2 (highlighted capabilities) -->
  <g font-family="'IBM Plex Mono', monospace" font-size="27" font-weight="600">
    <rect x="80" y="476" width="300" height="58" fill="#005a8c"/>
    <text x="230" y="514" text-anchor="middle" fill="#ffffff">Retraction check</text>

    <rect x="396" y="476" width="300" height="58" fill="#005a8c"/>
    <text x="546" y="514" text-anchor="middle" fill="#ffffff">Journal metrics</text>

    <rect x="712" y="476" width="292" height="58" fill="#005a8c"/>
    <text x="858" y="514" text-anchor="middle" fill="#ffffff">Citations</text>
  </g>

  <!-- Domain footer -->
  <text x="80" y="600" font-family="'IBM Plex Mono', monospace" font-size="30" font-weight="600" fill="#005a8c">doilookup.com</text>
</svg>
